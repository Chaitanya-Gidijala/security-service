# ===============================
# Production Environment
# ===============================

# Database (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Default Admin (Prod)
app.default-admin.email=${ADMIN_EMAIL}
app.default-admin.password=${ADMIN_PASSWORD}

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt-secret=${APP_JWT_SECRET}
app.jwt-expiration-milliseconds=604800000

# Auth Service
app.auth-service.url=${APP_AUTH_SERVICE_URL}
app.auth-service.base-url=${APP_AUTH_SERVICE_BASE_URL}
app.auth-service.validate-token-endpoint=${APP_AUTH_VALIDATE_ENDPOINT}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
