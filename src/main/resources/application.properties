# ================================================
# Application (common across all profiles)
# ================================================
spring.application.name=security-service
spring.config.import=optional:file:.env[.properties]
server.port=${PORT}
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

# ================================================
# Default Admin Credentials (overridden per profile)
# ================================================
app.default-admin.email=${ADMIN_EMAIL}
app.default-admin.password=${ADMIN_PASSWORD}

# ================================================
# HikariCP Connection Pool
# ================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ================================================
# JPA Performance Tuning
# ================================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ================================================
# Actuator
# ================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ================================================
# Logging
# ================================================
logging.level.root=INFO
logging.level.com.security=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
