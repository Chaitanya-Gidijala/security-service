# ================================================
# Application (common across all profiles)
# ================================================
spring.application.name=security-service
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:10000}
server.address=0.0.0.0
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ================================================
# Default Admin & User Credentials
# ================================================
app.default-admin.email=${ADMIN_EMAIL:admin@chaitanyatechworld.com}
app.default-admin.password=${ADMIN_PASSWORD:Admin@123}

app.super-admin.email=${SUPER_ADMIN_EMAIL:superadmin@chaitanyatechworld.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:SuperAdmin@2026}

app.default-user.email=${USER_EMAIL:user@chaitanyatechworld.com}
app.default-user.password=${USER_PASSWORD:User@123}

# ================================================
# JWT Configuration
# ================================================
app.jwt-secret=${APP_JWT_SECRET:daf66e01593f61a15b857cf433aae03a005812b31234e149036bcc8dee755dbb}
app.jwt-expiration-milliseconds=${APP_JWT_EXPIRATION:604800000}

# ================================================
# Internal Auth Service Reference
# ================================================
app.auth-service.url=${APP_AUTH_SERVICE_URL:http://localhost:8080}
app.auth-service.validate-endpoint=${APP_AUTH_VALIDATE_ENDPOINT:http://localhost:8080/api/auth/validate}

# ================================================
# CORS Settings
# ================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ================================================
# OAuth2 Configuration
# ================================================
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ================================================
# HikariCP Connection Pool
# ================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1

# ================================================
# JPA Performance Tuning
# ================================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ================================================
# Actuator
# ================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ================================================
# Logging
# ================================================
logging.level.root=INFO
logging.level.com.security=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n